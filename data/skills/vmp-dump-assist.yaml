# 技能：VMP 脱壳辅助流程
# 用于识别和应对 DEX VMP 保护
name: vmp-dump-assist
description: 辅助识别和应对 DEX VMP 保护的流程
applies_to:
  - android
tags:
  - vmp
  - 脱壳
  - dex-vmp
steps:
  - tool: jadx_search_classes_by_keyword
    args:
      search_term: libDexHelper
      search_in: class
    description: 搜索 libDexHelper 相关类——典型 VMP 壳特征

  - tool: jadx_search_classes_by_keyword
    args:
      search_term: DexGuard
      search_in: class
    description: 搜索 DexGuard 相关类

  - tool: apktool_search_string
    args:
      keyword: libsecexe.so
    description: 在 Smali 中搜索壳的 SO 加载痕迹
