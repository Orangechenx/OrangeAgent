# 技能：SSL Pinning 统一绕过流程
# 适用于 Android 逆向中的 HTTPS 抓包场景
name: bypass-ssl-pinning
description: 通用 SSL Pinning 绕过流程，覆盖常见框架和自定义 TrustManager
applies_to:
  - android
tags:
  - ssl
  - network
  - hook
  - 抓包
steps:
  - tool: frida_bypass_ssl_pinning
    description: 使用 Frida 内置的 SSL Pinning 绕过（一键方案）
    note: 如不生效，说明 App 使用了自定义 TrustManager 或证书透明度检查

  - tool: jadx_search_classes_by_keyword
    args:
      search_term: TrustManager
      search_in: class
    description: 搜索 App 中自定义的 TrustManager 实现类

  - tool: jadx_search_classes_by_keyword
    args:
      search_term: checkServerTrusted
      search_in: method
    description: 搜索 checkServerTrusted 方法定位校验逻辑

  - tool: frida_hook_method
    args:
      class: javax.net.ssl.X509TrustManager
      method: checkServerTrusted
    description: Hook X509TrustManager 的校验方法，让其接受所有证书

  - tool: jadx_search_classes_by_keyword
    args:
      search_term: CertificatePinner
      search_in: class
    description: 搜索 OkHttp 的 CertificatePinner 实现
